name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y debhelper devscripts build-essential

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update changelog version
        run: |
          sed -i "s/^proxs3 (.*/proxs3 (${{ steps.version.outputs.version }}-1) unstable; urgency=medium/" debian/changelog

      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b -d

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ../proxs3_*.deb
          generate_release_notes: true

  build-binary:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        run: go build -o proxs3d-linux-amd64 ./cmd/proxs3d

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: proxs3d-linux-amd64
